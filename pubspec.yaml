name: my_app
description: "BuilderPost AI - Transform project descriptions into social media posts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # AI
  google_generative_ai: ^0.4.6

  # State Management
  flutter_riverpod: ^2.6.1

  # Image & File Handling
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Sharing & URLs
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # HTTP
  http: ^1.2.2

  # Markdown
  flutter_markdown: ^0.7.5

  # Shimmer
  shimmer: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Local Persistence
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  syncfusion_flutter_pdf: ^31.1.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
